<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Je suis fier de toi</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow-x: hidden;
      position: relative;
      padding: 1rem;
      font-family: "Lora", serif;
    }

    body::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(168,85,247,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(236,72,153,0.12) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(59,130,246,0.1) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      33% { transform: translate(2%,-2%) rotate(1deg); }
      66% { transform: translate(-1%,1%) rotate(-1deg); }
    }

    /* ---- FORM SCREEN ---- */
    #form-screen {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      max-width: 500px;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #form-screen.fade-out {
      opacity: 0;
      transform: scale(0.95) translateY(-20px);
    }

    #form-screen .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1.2rem, 4vw, 3rem);
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }

    #form-screen h2 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.4rem, 6vw, 3rem);
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    #form-screen p {
      color: rgba(255,255,255,0.45);
      font-style: italic;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    #name-input {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-family: "Lora", serif;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1rem;
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-align: center;
      outline: none;
      transition: border-color 0.4s cubic-bezier(0.4,0,0.2,1), box-shadow 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    #name-input::placeholder { color: rgba(255,255,255,0.25); }
    #name-input:focus {
      border-color: rgba(224,195,252,0.5);
      box-shadow: 0 0 25px rgba(224,195,252,0.15);
    }

    #submit-btn {
      margin-top: 1.5rem;
      padding: 0.9rem 3rem;
      font-family: "Great Vibes", cursive;
      font-size: 1.6rem;
      border: none;
      border-radius: 1rem;
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      color: #1a1a2e;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    #submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(224,195,252,0.35);
    }

    /* ---- SIGN SCREEN ---- */
    #sign-screen {
      display: none;
      position: relative;
      z-index: 10;
      text-align: center;
      width: 100%;
      max-width: 500px;
      opacity: 0;
      transform: scale(0.95) translateY(20px);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sign-screen.fade-in {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    #sign-screen.fade-out {
      opacity: 0;
      transform: scale(0.95) translateY(-20px);
    }
    #sign-screen .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(1.5rem, 4vw, 3rem) clamp(1.2rem, 4vw, 3rem);
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    #sign-screen h2 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.4rem, 6vw, 3rem);
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    #sign-screen p {
      color: rgba(255,255,255,0.45);
      font-style: italic;
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }
    #sign-select {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      font-family: "Lora", serif;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1rem;
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-align: center;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.4s cubic-bezier(0.4,0,0.2,1), box-shadow 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #sign-select:focus {
      border-color: rgba(224,195,252,0.5);
      box-shadow: 0 0 25px rgba(224,195,252,0.15);
    }
    #sign-select option { background: #1a1a2e; color: #fff; }

    #birth-fields {
      display: none;
      width: 100%;
      margin-top: 1rem;
      flex-direction: column;
      gap: 0.75rem;
    }
    #birth-fields.visible { display: flex; }
    #birth-fields label {
      text-align: left;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      font-style: italic;
    }
    #birth-fields input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      font-family: "Lora", serif;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0.8rem;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      color-scheme: dark;
      transition: border-color 0.4s cubic-bezier(0.4,0,0.2,1), box-shadow 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    #birth-fields input:focus {
      border-color: rgba(224,195,252,0.5);
      box-shadow: 0 0 20px rgba(224,195,252,0.15);
    }
    #birth-hint {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      font-style: italic;
      margin-top: 0.25rem;
    }

    #sign-submit {
      margin-top: 1.5rem;
      padding: 0.9rem 3rem;
      font-family: "Great Vibes", cursive;
      font-size: 1.6rem;
      border: none;
      border-radius: 1rem;
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      color: #1a1a2e;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #sign-submit:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(224,195,252,0.35);
    }
    #sign-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- MAIN SCREEN ---- */
    #main-screen {
      display: none;
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 600px;
      opacity: 0;
      transform: scale(0.9) translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    #main-screen.fade-in {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Halo lumineux derriere la carte */
    #main-screen::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      width: 120%; height: 120%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(224,195,252,0.08) 0%, transparent 70%);
      animation: haloPulse 4s cubic-bezier(0.4,0,0.6,1) infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes haloPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    }

    #main-screen .card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 4rem) clamp(1.2rem, 4vw, 4rem);
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      z-index: 2;
      position: relative;
    }

    #main-screen h1 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.6rem, 7vw, 5rem);
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.4;
      letter-spacing: 2px;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      width: 100%;
    }

    #main-screen .sub {
      font-style: italic;
      color: rgba(255,255,255,0.55);
      font-size: clamp(0.85rem, 2.5vw, 1.15rem);
      margin-top: 1.5rem;
      letter-spacing: 0.5px;
      width: 100%;
    }

    #main-screen .message {
      margin-top: 1.8rem;
      color: rgba(255,255,255,0.50);
      font-style: italic;
      line-height: 1.8;
      font-size: clamp(0.8rem, 2.2vw, 1.05rem);
      width: 100%;
    }

    .message .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
      animation: wordFadeIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes wordFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- HEARTS (smooth Apple-style) ---- */
    @keyframes fall {
      0% { transform: translateY(-5vh) rotate(0deg) scale(0.8); opacity: 0; }
      8% { opacity: 1; transform: translateY(0) rotate(5deg) scale(1); }
      92% { opacity: 0.8; }
      100% { transform: translateY(105vh) rotate(25deg) scale(0.9); opacity: 0; }
    }
    @keyframes sway {
      0%, 100% { margin-left: 0; }
      50% { margin-left: 20px; }
    }
    .heart {
      position: fixed;
      top: -5vh;
      animation: fall cubic-bezier(0.4,0,0.6,1) infinite, sway cubic-bezier(0.4,0,0.6,1) infinite;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      will-change: transform, opacity;
    }

    /* ---- STARS (flottantes) ---- */
    @keyframes starFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-15px) scale(1.2); opacity: 0.7; }
    }
    .star {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      user-select: none;
      animation: starFloat cubic-bezier(0.4,0,0.6,1) infinite;
      will-change: transform, opacity;
    }

    /* ---- DOTS ---- */
    .dot {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: dotPulse 5s cubic-bezier(0.4,0,0.6,1) infinite;
      will-change: transform, opacity;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1); }
    }

    /* ---- SPARKLES ---- */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-size: 1.5rem;
      animation: sparkleAnim 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
      will-change: transform, opacity;
    }
    @keyframes sparkleAnim {
      0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
      60% { opacity: 0.8; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0) rotate(180deg); }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 768px) {
      #form-screen .card, #sign-screen .card { padding: 2rem 1.5rem; margin: 0 1rem; border-radius: 1.5rem; }
      #form-screen p, #sign-screen p { font-size: 0.85rem; margin-bottom: 1.5rem; }
      #name-input, #sign-select { padding: 0.8rem 1rem; font-size: 1rem; }
      #submit-btn, #sign-submit { padding: 0.7rem 2rem; font-size: 1.3rem; }
      #main-screen .card { padding: 2.5rem 1.5rem; margin: 0 1rem; border-radius: 1.5rem; }
    }

    @media (max-width: 480px) {
      #form-screen .card, #sign-screen .card { padding: 1.8rem 1.2rem; margin: 0 0.75rem; border-radius: 1.2rem; }
      #form-screen p, #sign-screen p { font-size: 0.8rem; margin-bottom: 1.2rem; }
      #name-input, #sign-select { padding: 0.7rem 0.8rem; font-size: 0.9rem; border-radius: 0.8rem; }
      #submit-btn, #sign-submit { padding: 0.6rem 1.5rem; font-size: 1.1rem; border-radius: 0.8rem; }
      #main-screen .card { padding: 2rem 1.2rem; margin: 0 0.75rem; border-radius: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- FORMULAIRE -->
  <div id="form-screen">
    <div class="card">
      <h2>Dis-moi ton prenom...</h2>
      <p>Entre ton vrai prenom, celui qui te ressemble.</p>
      <input type="text" id="name-input" placeholder="Ton prenom..." autocomplete="off" autofocus>
      <br>
      <button id="submit-btn">Decouvrir</button>
    </div>
  </div>

  <!-- SIGNE ASTRO -->
  <div id="sign-screen">
    <div class="card">
      <h2 id="sign-title">Et ton signe astro ?</h2>
      <p>Pour un message qui te ressemble vraiment.</p>
      <select id="sign-select">
        <option value="">Choisis ton signe...</option>
        <option value="belier">Belier</option>
        <option value="taureau">Taureau</option>
        <option value="gemeaux">Gemeaux</option>
        <option value="cancer">Cancer</option>
        <option value="lion">Lion</option>
        <option value="vierge">Vierge</option>
        <option value="balance">Balance</option>
        <option value="scorpion">Scorpion</option>
        <option value="sagittaire">Sagittaire</option>
        <option value="capricorne">Capricorne</option>
        <option value="verseau">Verseau</option>
        <option value="poissons">Poissons</option>
        <option value="unknown">Je ne sais pas</option>
      </select>
      <div id="birth-fields">
        <label for="birthdate">Ta date de naissance</label>
        <input type="date" id="birthdate" required>
        <label for="birthtime">Heure (facultatif)</label>
        <input type="time" id="birthtime">
        <div id="birth-hint">La date est obligatoire, l'heure est facultative.</div>
      </div>
      <button id="sign-submit" disabled>Reveler</button>
    </div>
  </div>

  <!-- PAGE PRINCIPALE -->
  <div id="main-screen">
    <div class="card">
      <h1 id="love-text"></h1>
      <p class="sub" id="sub-text"></p>
      <p class="message" id="message-text"></p>
    </div>
  </div>

  <script>
    const formScreen = document.getElementById("form-screen");
    const signScreen = document.getElementById("sign-screen");
    const mainScreen = document.getElementById("main-screen");
    const nameInput = document.getElementById("name-input");
    const submitBtn = document.getElementById("submit-btn");
    const signTitle = document.getElementById("sign-title");
    const signSelect = document.getElementById("sign-select");
    const birthFields = document.getElementById("birth-fields");
    const birthdateInput = document.getElementById("birthdate");
    const birthtimeInput = document.getElementById("birthtime");
    const signSubmit = document.getElementById("sign-submit");
    const loveText = document.getElementById("love-text");
    const subText = document.getElementById("sub-text");
    const messageText = document.getElementById("message-text");

    let pendingName = null; // carried between name screen and sign screen

    // Texte d'erreur technique uniquement — jamais un faux message de bienveillance.
    const ERROR_TEXT = "Le message ne peut pas etre genere pour le moment. Reessaye dans un instant.";

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") launch();
    });
    submitBtn.addEventListener("click", launch);

    // --- SIGN SCREEN LOGIC ---
    signSelect.addEventListener("change", () => {
      const v = signSelect.value;
      if (v === "unknown") {
        birthFields.classList.add("visible");
        birthdateInput.required = true;
      } else {
        birthFields.classList.remove("visible");
        birthdateInput.required = false;
      }
      updateSignSubmitState();
    });
    birthdateInput.addEventListener("change", updateSignSubmitState);
    signSubmit.addEventListener("click", submitSign);

    function updateSignSubmitState() {
      const v = signSelect.value;
      if (!v) { signSubmit.disabled = true; return; }
      if (v === "unknown") { signSubmit.disabled = !birthdateInput.value; return; }
      signSubmit.disabled = false;
    }

    function computeSignFromDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      if (isNaN(d)) return null;
      const m = d.getMonth() + 1;
      const day = d.getDate();
      if ((m === 3 && day >= 21) || (m === 4 && day <= 19)) return "belier";
      if ((m === 4 && day >= 20) || (m === 5 && day <= 20)) return "taureau";
      if ((m === 5 && day >= 21) || (m === 6 && day <= 20)) return "gemeaux";
      if ((m === 6 && day >= 21) || (m === 7 && day <= 22)) return "cancer";
      if ((m === 7 && day >= 23) || (m === 8 && day <= 22)) return "lion";
      if ((m === 8 && day >= 23) || (m === 9 && day <= 22)) return "vierge";
      if ((m === 9 && day >= 23) || (m === 10 && day <= 22)) return "balance";
      if ((m === 10 && day >= 23) || (m === 11 && day <= 21)) return "scorpion";
      if ((m === 11 && day >= 22) || (m === 12 && day <= 21)) return "sagittaire";
      if ((m === 12 && day >= 22) || (m === 1 && day <= 19)) return "capricorne";
      if ((m === 1 && day >= 20) || (m === 2 && day <= 18)) return "verseau";
      return "poissons"; // 19/02 - 20/03
    }

    function goToSignScreen(name) {
      pendingName = name;
      signTitle.textContent = "Et ton signe astro, " + name + " ?";
      formScreen.classList.add("fade-out");
      setTimeout(() => {
        formScreen.style.display = "none";
        signScreen.style.display = "block";
        signScreen.offsetHeight;
        signScreen.classList.add("fade-in");
        signSelect.focus();
      }, 600);
    }

    async function submitSign() {
      if (!pendingName) return;
      let sign = signSelect.value;
      let birthdate = "";
      let birthtime = "";
      if (sign === "unknown") {
        birthdate = birthdateInput.value;
        birthtime = birthtimeInput.value;
        if (!birthdate) { birthdateInput.focus(); return; }
        const computed = computeSignFromDate(birthdate);
        if (!computed) { birthdateInput.focus(); return; }
        sign = computed;
      }

      signSubmit.disabled = true;
      const originalLabel = signSubmit.textContent;
      signSubmit.textContent = "...";

      try {
        const resp = await fetch("/api/visitor", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: pendingName, sign, birthdate, birthtime })
        });
        const data = await resp.json().catch(() => ({}));

        if (resp.status === 403 && data.already_visited) {
          if (data.message && data.message !== "Tu as deja decouvert ton message.") {
            localStorage.setItem("love_prenom", data.name || pendingName);
            transitionSignToMain(data.name || pendingName, data.message);
          } else {
            // Retour a l'ecran prenom avec une info douce
            signScreen.classList.remove("fade-in");
            signScreen.style.display = "none";
            formScreen.style.display = "block";
            formScreen.classList.remove("fade-out");
            showAlreadyVisited(data.name || pendingName);
          }
          return;
        }

        if (!resp.ok || !data.message) {
          // IA indisponible / rate limit / autre erreur technique — pas de faux message.
          transitionSignToMain(pendingName, ERROR_TEXT);
          return;
        }

        localStorage.setItem("love_prenom", pendingName);
        transitionSignToMain(pendingName, data.message);
      } catch {
        transitionSignToMain(pendingName, ERROR_TEXT);
      } finally {
        signSubmit.disabled = false;
        signSubmit.textContent = originalLabel;
      }
    }

    function transitionSignToMain(name, message) {
      loveText.textContent = "Je suis fier de toi, " + name;
      subText.textContent = "Cette page est pour toi, " + name + ".";
      document.title = "Je suis fier de toi, " + name;

      signScreen.classList.add("fade-out");
      setTimeout(() => {
        signScreen.style.display = "none";
        mainScreen.style.display = "block";
        mainScreen.offsetHeight;
        mainScreen.classList.add("fade-in");

        spawnSparkles(window.innerWidth / 2, window.innerHeight / 2, 60);

        messageText.innerHTML = '<span class="word" style="animation-delay:0s;opacity:0.4">...</span>';
        messageText.querySelector(".word").style.animation = "wordFadeIn 0.4s forwards, haloPulse 2s infinite";

        if (message) setTimeout(() => revealWords(message), 600);

        spawnHearts();
        spawnStars();
        spawnDots();
      }, 600);
    }

    function hasVisited() {
      return localStorage.getItem("love_prenom") || document.cookie.includes("love_visited=1");
    }

    // Check localStorage on load — restore cached message
    const savedName = localStorage.getItem("love_prenom");
    if (savedName) {
      formScreen.style.display = "none";
      mainScreen.style.display = "block";
      mainScreen.offsetHeight;
      mainScreen.classList.add("fade-in");
      loveText.textContent = "Je suis fier de toi, " + savedName;
      subText.textContent = "Cette page est pour toi, " + savedName + ".";
      document.title = "Je suis fier de toi, " + savedName;
      spawnHearts();
      spawnStars();
      spawnDots();

      // Fetch cached AI message from server
      fetch("/api/my-message?name=" + encodeURIComponent(savedName))
        .then(async r => {
          if (r.status === 404) {
            // Plus de trace de ce prenom cote serveur — on efface et on recommence.
            localStorage.removeItem("love_prenom");
            location.reload();
            return null;
          }
          const data = await r.json().catch(() => ({}));
          if (!r.ok || !data.message) throw new Error(data.error || "fail");
          return data.message;
        })
        .then(msg => { if (msg) revealWords(msg); })
        .catch(() => revealWords(ERROR_TEXT));
    }

    function showAlreadyVisited(name) {
      nameInput.value = "";
      nameInput.placeholder = "Tu as deja tente ta chance, " + name + "...";
      nameInput.style.borderColor = "rgba(239,68,68,0.6)";
      nameInput.style.boxShadow = "0 0 20px rgba(239,68,68,0.2)";
      setTimeout(() => {
        nameInput.style.borderColor = "";
        nameInput.style.boxShadow = "";
        nameInput.placeholder = "Ton prenom...";
      }, 3000);
    }

    function launch() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }

      const pretty = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

      // Client-side check: if this browser already visited under another name
      const existing = localStorage.getItem("love_prenom");
      if (existing && existing !== pretty) {
        showAlreadyVisited(existing);
        return;
      }

      // Carry the name to the sign screen; actual POST happens after sign choice.
      goToSignScreen(pretty);
    }

    // ---- WORD BY WORD REVEAL ----
    function revealWords(text) {
      const words = text.split(" ");
      messageText.innerHTML = "";
      words.forEach((word, i) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word + "\u00A0";
        span.style.animationDelay = (i * 0.06) + "s";
        messageText.appendChild(span);
      });
    }

    // ---- SPARKLES ----
    function spawnSparkles(cx, cy, count) {
      const emojis = ["\u2728", "\uD83D\uDCAB", "\u2B50", "\uD83D\uDC96", "\u2763\uFE0F", "\uD83C\uDF1F", "\uD83E\uDD0D"];
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        el.className = "sparkle";
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const dist = 80 + Math.random() * 280;
        el.style.left = cx + "px";
        el.style.top = cy + "px";
        el.style.setProperty("--dx", Math.cos(angle) * dist + "px");
        el.style.setProperty("--dy", Math.sin(angle) * dist + "px");
        el.style.fontSize = (1 + Math.random() * 1.5) + "rem";
        el.style.animationDuration = (0.8 + Math.random() * 0.8) + "s";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
      }
    }

    // ---- HEARTS (smooth, slow, Apple-like) ----
    function spawnHearts() {
      const hearts = ["\u2764\uFE0F", "\uD83E\uDD0D", "\uD83D\uDC95", "\uD83D\uDC96", "\uD83D\uDC97", "\uD83D\uDC9C", "\uD83E\uDE77", "\uD83D\uDC9B"];
      for (let i = 0; i < 25; i++) {
        const el = document.createElement("div");
        el.className = "heart";
        el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = (0.7 + Math.random() * 1) + "rem";
        el.style.animationDuration = (12 + Math.random() * 10) + "s, " + (4 + Math.random() * 4) + "s";
        el.style.animationDelay = (Math.random() * 8) + "s, " + (Math.random() * 4) + "s";
        el.style.opacity = 0.25 + Math.random() * 0.4;
        document.body.appendChild(el);
      }
    }

    // ---- STARS (floating gently) ----
    function spawnStars() {
      const stars = ["\u2728", "\u2B50", "\uD83C\uDF1F", "\u00B7"];
      for (let i = 0; i < 20; i++) {
        const el = document.createElement("div");
        el.className = "star";
        el.textContent = stars[Math.floor(Math.random() * stars.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = Math.random() * 100 + "vh";
        el.style.fontSize = (0.5 + Math.random() * 0.8) + "rem";
        el.style.animationDuration = (5 + Math.random() * 6) + "s";
        el.style.animationDelay = (Math.random() * 5) + "s";
        document.body.appendChild(el);
      }
    }

    // ---- DOTS ----
    function spawnDots() {
      const colors = [
        "rgba(168,85,247,0.5)", "rgba(236,72,153,0.4)", "rgba(59,130,246,0.4)",
        "rgba(224,195,252,0.3)", "rgba(245,213,224,0.3)", "rgba(255,221,183,0.3)",
        "rgba(147,51,234,0.4)", "rgba(251,146,60,0.3)"
      ];
      for (let i = 0; i < 30; i++) {
        const dot = document.createElement("div");
        dot.classList.add("dot");
        const size = Math.random() * 10 + 3;
        dot.style.width = size + "px";
        dot.style.height = size + "px";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.top = Math.random() * 100 + "vh";
        dot.style.background = colors[Math.floor(Math.random() * colors.length)];
        dot.style.animationDelay = (Math.random() * 5) + "s";
        dot.style.animationDuration = (4 + Math.random() * 4) + "s";
        dot.style.boxShadow = "0 0 " + (size * 2) + "px " + dot.style.background;
        document.body.appendChild(dot);
      }
    }
  </script>
</body>
</html>
