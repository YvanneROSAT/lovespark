<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yvan, Aaron et Nathan</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                  radial-gradient(circle at 50% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    .card {
      position: relative;
      text-align: center;
      padding: 4rem 6rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-family: "Great Vibes", cursive;
      font-size: 5rem;
      background: linear-gradient(135deg, #e0c3fc, #f5d5e0, #ffddb7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
      letter-spacing: 2px;
    }

    p {
      font-family: "Lora", serif;
      font-style: italic;
      color: rgba(255, 255, 255, 0.55);
      font-size: 1.15rem;
      margin-top: 1.5rem;
      letter-spacing: 0.5px;
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: dotPulse 4s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes sway {
      0%, 100% { margin-left: 0; }
      25% { margin-left: 30px; }
      75% { margin-left: -30px; }
    }

    .heart {
      position: fixed;
      top: -5vh;
      animation: fall linear infinite, sway 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }

    .card {
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Yvan, Aaron et Nathan</h1>
    <p>Majestic.</p>
  </div>
  <script>
    // Hearts falling
    const hearts = ["\u2764\uFE0F", "\uD83E\uDD0D", "\uD83D\uDC95", "\uD83D\uDC96", "\uD83D\uDC97", "\uD83D\uDC9C", "\uD83E\uDE77", "\uD83D\uDC9B"];
    for (let i = 0; i < 35; i++) {
      const el = document.createElement("div");
      el.className = "heart";
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.fontSize = (0.8 + Math.random() * 1.5) + "rem";
      el.style.animationDuration = (6 + Math.random() * 8) + "s, " + (2 + Math.random() * 3) + "s";
      el.style.animationDelay = (Math.random() * 10) + "s, " + (Math.random() * 3) + "s";
      el.style.opacity = 0.4 + Math.random() * 0.6;
      document.body.appendChild(el);
    }
  </script>
  <script>
    const colors = [
      'rgba(168, 85, 247, 0.6)',
      'rgba(236, 72, 153, 0.5)',
      'rgba(59, 130, 246, 0.5)',
      'rgba(224, 195, 252, 0.4)',
      'rgba(245, 213, 224, 0.4)',
      'rgba(255, 221, 183, 0.4)',
      'rgba(147, 51, 234, 0.5)',
      'rgba(251, 146, 60, 0.4)',
    ];
    for (let i = 0; i < 40; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      const size = Math.random() * 12 + 4;
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.top = Math.random() * 100 + 'vh';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.animationDelay = (Math.random() * 4) + 's';
      dot.style.animationDuration = (Math.random() * 3 + 3) + 's';
      dot.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + dot.style.background;
      document.body.appendChild(dot);
    }
  </script>
</body>
</html>
